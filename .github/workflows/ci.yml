name: CI

on:
  pull_request:
    branches: ['**']

jobs:
  syntax-check:
    name: PHP Syntax Check
    runs-on: [nonprod-eks-runners]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax
        run: |
          find . -name "*.php" \
            -not -path "*/vendor/*" \
            -not -path "*/.git/*" \
            -print0 | xargs -r0 php -l
